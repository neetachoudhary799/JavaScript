
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="myDiv">hello</div>
<div id="myDiv"> neeta</div>
<div id="mysecondDiv"> <h1>I am here</h1></div>
<script>
    const div=document.getElementById('myDiv'); //only change first div
   div.innerText='hi';  //text ko change krne ke liye textContent ya innerText dono use kr skte hai
  div.style.color='red'; //text color change krne ke liye style.color use krte hai
  div.style.backgroundColor='yellow'; //background color change krne ke liye style.background
   const divv=document.getElementById('#mysecondDiv');
   divv.innerHTML='<h1>Change text</h1>';  //html ko change krne ke liye innerHTML use krte hai
</script>
<!---output
<div id="myDiv">hi</div>
<div id="myDiv">neeta</div> 
<div id="mysecondDiv"><h1>Change text</h1></div>
--->
</body>
</html>
