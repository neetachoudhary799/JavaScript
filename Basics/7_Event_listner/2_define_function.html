<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div onclick="changeColor()">hello</div>
    <script>
        function changeColor() {
            const div = document.querySelector('div');
            div.innerText='my name is neeta';
            div.style.color = 'red';
        }
    </script>
</body>
</html>
