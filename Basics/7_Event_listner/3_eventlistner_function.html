<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Event Listner</h1>
    <p>Event Listner is used to add event to the element. its not create duplicate events .every event function perform independently   .</p>
    <div  id="myDivfunction">click me</div>
    <script>
        //define function
        const divv=document.getElementById('myDivfunction');
        divv.addEventListener('click',function(){
             divv.style.backgroundColor='yellow';
        });
        divv.addEventListener('click',changeColor);
        function changeColor(){
            divv.innerText='my name is function';
            divv.style.color='red';
        }
        </script>
</body>
</html>
